<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turubka Casriga ah - Iskaala 101</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
</head>
<body>

<!-- 1. SETUP SCREEN -->
<div id="setup-screen">
    <h1 style="color: #f1c40f;">Ku soo dhawaaw Turubka</h1>
    <p style="color: #ccc;">Fadlan geli magacaaga si aad u bilowdo</p>
    <input type="text" id="nameInput" placeholder="Magacaaga..." maxlength="15">
    <button id="startGameBtn" class="btn-main">BILOW CIYAARTA</button>
</div>

<!-- Qolka Sugitaanka -->
<div id="waiting-room" style="display:none;">
    <h2>Qolka Sugitaanka</h2>
    <div id="players-list"></div>
    <p id="waiting-status">Raadinaya... (0/4)</p>
</div>

<!-- 2. HEADER -->
<header id="main-header" class="game-header" style="display:none;">
    <div class="welcome-msg">
        <span class="dot-online">●</span>
        <span id="display-name">Guest</span>
    </div>
    <div id="turnText">SUG DOORKAAGA...</div>
    <div class="game-stats">
        <div class="score-badge">Dhibcaha: <span id="my-score">0</span></div>
        <button class="exit-btn" onclick="location.reload()">Ka bax</button>
    </div>
</header>

<!-- 3. GAME TABLE -->
<main id="game-table" style="display:none;">

    <div id="table-area">
    <div class="player-slot-wrapper pos-top">
        <div id="name-top" class="player-name-label"></div>
        <div id="pos-top" class="player-table-pos"></div>
    </div>

    <div class="player-slot-wrapper pos-left">
        <div id="name-left" class="player-name-label"></div>
        <div id="pos-left" class="player-table-pos"></div>
    </div>

    <div class="player-slot-wrapper pos-right">
        <div id="name-right" class="player-name-label"></div>
        <div id="pos-right" class="player-table-pos"></div>
    </div>

    <div class="player-slot-wrapper pos-bottom">
        <div id="name-bottom" class="player-name-label">Adiga</div>
        <div id="pos-bottom" class="player-table-pos">
            <div id="my-table-sets"></div> 
        </div>
    </div>
</div>

    <section id="center-area">
        <div class="piles-wrapper" style="display: flex; gap: 40px; align-items: center; justify-content: center;">
            
            <div class="pile-container" style="display: flex; flex-direction: column; align-items: center;">
                <div id="stock-pile" class="pile">
                    <div class="card-back">
                        <span id="stock-count">88</span>
                    </div>
                </div>
                <div class="pile-label">Qaadasho</div>
            </div>

            <div class="pile-container" style="display: flex; flex-direction: column; align-items: center;">
                <div id="discard-pile" class="pile">
                    </div>
                <div class="pile-label" style="color: white;">Tuurista</div>
            </div>

        </div>
    </section>
</main>

<!-- 4. GACANTAADA -->
<div id="my-hand-section" class="player-hand-section" style="display:none;">
    <div id="my-hand"></div>
    <div class="action-buttons">
        <button id="dhigoBtn">Dhigo</button>
        <button id="resetBtn">Ka noqo</button>
        <button id="sortBtn">Sort</button>
        <button id="tuurBtn">Tuur</button>
    </div>
    <!-- Meesha ay dhibcaha kumeel-gaarka ah ku soo baxayaan -->
    <div style="color: #f1c40f; margin-top: 5px; font-weight: bold;">
        Dhibcaha hadda: <span id="temp-score-display">0</span>
    </div>
</div>

<!-- 5. FOOTER -->
<footer class="dev-footer">
    <div class="dev-info">Developed by: <span class="dev-name">Abshir Hassan</span></div> 
    <div class="copyright">© 2026 All Rights Reserved</div>
</footer>

<!-- SCRIPTS -->
<script src="/socket.io/socket.io.js"></script>
<script src="script.js?v=test1234"></script>
</body>
</html>
